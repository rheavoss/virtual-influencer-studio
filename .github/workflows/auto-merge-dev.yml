name: Auto PR + Merge dev → main
on:
  push:
    branches: [ dev ]
  check_run:
    types: [ completed ]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Step 1: On every push to dev, ensure a PR dev→main exists
  create-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "auto: sync dev → main" \
              --body "Automated PR. RALPH gate CI will validate and auto-merge on pass."
            echo "PR created"
          else
            echo "PR #$EXISTING already open — no action needed"
          fi

  # Step 2: When enforce-ralph CI passes, auto-merge the PR
  auto-merge-on-pass:
    if: |
      github.event_name == 'check_run' &&
      github.event.check_run.name == 'enforce-ralph' &&
      github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge dev → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUM" ]; then
            gh pr merge $PR_NUM --squash --subject "auto: dev → main (RALPH gates passed)"
            echo "✅ Merged PR #$PR_NUM"
          else
            echo "No open PR found — nothing to merge"
          fi
