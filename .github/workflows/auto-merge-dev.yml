name: Auto PR + Merge dev → main
on:
  push:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-to-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RALPH_PAT }}

      - name: Ensure PR exists
        env:
          GH_TOKEN: ${{ secrets.RALPH_PAT }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "auto: sync dev → main" \
              --body "Automated PR. RALPH gates checked inline — merges immediately on pass."
            echo "PR created"
          else
            echo "PR #$EXISTING already open"
          fi

      - name: Check RALPH gates and merge
        env:
          GH_TOKEN: ${{ secrets.RALPH_PAT }}
        run: |
          PR_NUM=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR_NUM" ]; then
            echo "No open PR — nothing to merge"
            exit 0
          fi
          echo "PR #$PR_NUM found — checking gates"

          # Detect task folder in this PR
          TASK=$(git diff --name-only origin/main...origin/dev 2>/dev/null | grep "00_agency/tasks/TASK-" | head -1 | cut -d/ -f3 || echo "")

          if [ -n "$TASK" ]; then
            echo "Task detected: $TASK"
            FAIL=0
            for GATE in GATE_G0_COMPLETE.md GATE_G2_COMPLETE.md GATE_G3_COMPLETE.md; do
              if [ ! -f "00_agency/tasks/$TASK/$GATE" ]; then
                echo "❌ Missing: 00_agency/tasks/$TASK/$GATE"
                FAIL=1
              else
                echo "✅ $GATE present"
              fi
            done
            if [ "$FAIL" = "1" ]; then
              echo "Gates failed — not merging"
              exit 0
            fi
            echo "✅ All RALPH gates passed"
          else
            echo "No task folder changed — skipping gate check"
          fi

          echo "Merging PR #$PR_NUM → main"
          gh pr merge $PR_NUM --merge \
            --subject "auto: dev → main (RALPH gates passed)" \
            --delete-branch=false
          echo "✅ Merged"
