---
job: extension
config:
  name: "sara_v1"
  process:
    - type: 'sd_trainer'
      training_folder: "/workspace/output/sara_v1"
      device: cuda:0
      trigger_word: "saragirl"
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/workspace/sara_dataset"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [ 512, 768, 1024 ]
      train:
        batch_size: 1
        cache_text_embeddings: true
        steps: 3000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        dtype: bf16
      model:
        name_or_path: "Qwen/Qwen-Image"
        arch: "qwen_image"
        quantize: true
        qtype: "uint3|ostris/accuracy_recovery_adapters/qwen_image_torchao_uint3.safetensors"
        quantize_te: true
        qtype_te: "qfloat8"
        low_vram: true
      sample:
        sampler: "flowmatch"
        sample_every: 500
        width: 1024
        height: 1024
        prompts:
          - "saragirl, beautiful Caucasian woman with striking blue eyes and long straight black hair, white bikini, beach, golden hour, natural skin texture, realistic photography"
          - "saragirl, beautiful Caucasian woman with striking blue eyes and long straight black hair, black sports bra and shorts, gym mirror selfie, realistic photography"
          - "saragirl, beautiful Caucasian woman with striking blue eyes and long straight black hair, floral dress, outdoor cafe, laughing, natural daylight, realistic photography"
        neg: "plastic skin, waxy, airbrushed, cartoon, bad anatomy, extra limbs"
        seed: 42
        walk_seed: true
        guidance_scale: 3
        sample_steps: 25

meta:
  name: "[name]"
  version: '1.0'
